<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Choix du continent | Secret Lounge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="continent.css">
</head>

<body>

<div class="container">

    <h1>🌍 Choisissez votre continent</h1>

    <p>Sélectionnez le continent où vous vous trouvez.</p>

    <button class="continent-btn" data-continent="africa">
        🌍 Afrique
    </button>

    <button class="continent-btn" data-continent="asia">
        🌏 Asie
    </button>

    <button class="continent-btn" data-continent="europe">
        🇪🇺 Europe
    </button>

    <button class="continent-btn" data-continent="america">
        🌎 Amériques
    </button>

</div>

<script src="continent.js"></script>

</body>
</html>
