<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Lounge</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

<script>

if(localStorage.getItem("ageVerified")!=="true"){
location.href="verificationAge.html";
}

if(!localStorage.getItem("userContinent")){
location.href="continent.html";
}

if(!localStorage.getItem("userCountry")){
location.href="country.html";
}

if(!localStorage.getItem("userRegion")){
location.href="region.html";
}

</script>

</head>

<body>

<header>

<h1 id="siteTitle">Secret Lounge</h1>

<p id="countryInfo"></p>

<div class="headerButtons">

<button id="changeCountry">
🌍 Changer de pays
</button>

<button id="changeRegion">
📍 Changer de région
</button>

</div>

</header>

<main>

<div id="profiles">

</div>

</main>

<div id="imageModal" class="modal">

<span id="closeModal">&times;</span>

<img id="modalImage">

</div>

<script src="script.js"></script>

</body>

</html>
